<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Leads Portal — Lazar Family Bakehouse</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="leads-data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:linear-gradient(135deg,#6a0dad,#9b30ff);color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(106,13,173,.35);position:sticky;top:0;z-index:100}
.header h1{font-size:1.5rem;font-weight:700;letter-spacing:.5px}
.header .sub{font-size:.85rem;opacity:.85;margin-top:2px}
.seg-tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 32px}
.seg-tab{padding:14px 24px;font-size:.92rem;font-weight:600;color:#777;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;display:flex;align-items:center;gap:8px}
.seg-tab:hover{color:#6a0dad;background:#f8f5ff}
.seg-tab.active{color:#6a0dad;border-bottom-color:#6a0dad}
.seg-tab .ct{background:#e8e8e8;color:#555;font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:12px;min-width:24px;text-align:center}
.seg-tab.active .ct{background:#ede0ff;color:#6a0dad}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding:14px 32px;background:#fafafa;border-bottom:1px solid #e8e8e8}
.toolbar input{flex:1;min-width:220px;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:.95rem}
.toolbar input:focus{outline:none;border-color:#6a0dad;box-shadow:0 0 0 3px rgba(106,13,173,.12)}
.toolbar select{padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:.95rem;background:#fff}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-p{background:#6a0dad;color:#fff}.btn-p:hover{background:#7b1fa2}
.btn-d{background:#e53935;color:#fff}.btn-d:hover{background:#c62828}
.btn-s{background:#e0e0e0;color:#333}.btn-s:hover{background:#bdbdbd}
.btn-sm{padding:6px 12px;font-size:.8rem}
.stats{display:flex;flex-wrap:wrap;gap:16px;padding:16px 32px}
.stat{flex:1;min-width:150px;background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;transition:.2s;border:2px solid transparent}
.stat:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.stat.sel{border-color:#6a0dad}
.stat .lb{font-size:.78rem;text-transform:uppercase;color:#777;font-weight:600;letter-spacing:.5px}
.stat .vl{font-size:1.7rem;font-weight:700}
.stat.cv .vl{color:#2e7d32}.stat.ht .vl{color:#e65100}.stat.sc .vl{color:#1565c0}.stat.tt .vl{color:#6a0dad}
.tw{padding:0 32px 16px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
thead{background:#fafafa}
th{padding:14px 16px;text-align:left;font-size:.8rem;text-transform:uppercase;color:#555;font-weight:700;letter-spacing:.5px;border-bottom:2px solid #e0e0e0;cursor:pointer;white-space:nowrap}
th:hover{color:#6a0dad}
td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:.92rem}
tr:hover td{background:#f8f5ff}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-cv{background:#e8f5e9;color:#2e7d32}.b-ht{background:#fff3e0;color:#e65100}.b-sc{background:#e3f2fd;color:#1565c0}
.acts{display:flex;gap:6px}
.modal-o{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:center}
.modal-o.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;width:90%;max-width:520px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:20px;font-size:1.3rem;color:#6a0dad}
.fg{margin-bottom:16px}
.fg label{display:block;margin-bottom:6px;font-weight:600;font-size:.88rem;color:#444}
.fg input,.fg select{width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:.95rem}
.fg input:focus,.fg select:focus{outline:none;border-color:#6a0dad;box-shadow:0 0 0 3px rgba(106,13,173,.15)}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.pag{display:flex;justify-content:space-between;align-items:center;padding:12px 32px 24px;flex-wrap:wrap;gap:12px}
.pag .pi{font-size:.85rem;color:#666}
.toast{position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 20px;border-radius:10px;color:#fff;font-size:.9rem;font-weight:600;opacity:0;transform:translateY(10px);transition:.3s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateY(0)}.toast.ok{background:#2e7d32}.toast.er{background:#c62828}
.empty{text-align:center;padding:60px 20px;color:#999}
.load{height:3px;background:#6a0dad;position:fixed;top:0;left:0;z-index:999;width:0;transition:width .3s}
.load.on{width:60%;animation:p 1.5s infinite}.load.dn{width:100%;transition:width .2s}
@keyframes p{0%,100%{opacity:1}50%{opacity:.6}}
@media(max-width:768px){.header{padding:14px 16px}.seg-tabs{padding:0 16px;overflow-x:auto}.seg-tab{padding:12px 16px;font-size:.85rem;white-space:nowrap}.toolbar,.stats,.tw,.pag{padding-left:16px;padding-right:16px}.stat{min-width:120px}}
</style>
</head>
<body>
<div class="load" id="lb"></div>
<div class="header">
  <div><h1>Sales Leads Portal</h1><div class="sub">Lazar Family Bakehouse — Lead Tracker</div></div>
  <button class="btn" onclick="openModal()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;font-weight:600">+ Add Lead</button>
</div>
<div class="seg-tabs" id="tabs"></div>
<div class="toolbar">
  <input type="text" id="q" placeholder="Search by name, company, email, phone, or status..." oninput="filt()">
  <select id="catFil" onchange="filt()"><option value="all">All Categories</option><option value="coffee">Coffee Shops</option><option value="hotel">Hotels</option><option value="grocery">Grocery / Markets</option><option value="other">Other</option></select>
  <select id="locFil" onchange="filt()"><option value="all">All Locations</option><option value="in">Colorado (In-State)</option><option value="out">Out of State</option></select>
  <label style="font-size:.82rem;color:#777;font-weight:600">Show:</label>
  <select id="pp" onchange="filt()"><option value="25">25</option><option value="50" selected>50</option><option value="100">100</option><option value="0">All</option></select>
  <button class="btn btn-s" onclick="csv()">Export CSV</button>
</div>
<div class="stats" id="st"></div>
<div class="tw"><table><thead><tr>
  <th onclick="srt('name')">Name</th><th onclick="srt('company')">Company</th>
  <th onclick="srt('email')">Email</th><th onclick="srt('phone')">Phone</th>
  <th onclick="srt('status')">Status</th><th>Actions</th>
</tr></thead><tbody id="tb"></tbody></table></div>
<div class="pag" id="pg"></div>
<div class="toast" id="tt"></div>
<div class="modal-o" id="mo">
  <div class="modal">
    <h2 id="mt">Add New Lead</h2>
    <input type="hidden" id="eid">
    <div class="fg"><label>Full Name *</label><input id="fn" placeholder="e.g. Jane Smith"></div>
    <div class="fg"><label>Company</label><input id="fc" placeholder="e.g. Acme Corp"></div>
    <div class="fg"><label>Email</label><input id="fe" placeholder="e.g. jane@acme.com"></div>
    <div class="fg"><label>Phone</label><input id="fp" placeholder="e.g. (555) 123-4567"></div>
    <div class="fg"><label>Status *</label><select id="fs"><option value="Scouting">Scouting</option><option value="Hot Lead">Hot Lead</option><option value="Converted">Converted</option></select></div>
    <div class="ma"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" id="sb" onclick="save()">Save Lead</button></div>
  </div>
</div>
<script>
const SB_URL='https://ymkwhlgtkvojtwsnamzi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlta3dobGd0a3ZvanR3c25hbXppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzk5NjcsImV4cCI6MjA4OTcxNTk2N30.aQBDMP2oDrXMTRea-iijQZLraPmryzBrdXGw06iSWR4';
const db=supabase.createClient(SB_URL,SB_KEY);
let all=[],fil=[],sc='name',sa=true,cp=1,seg='all';
function pp(){const v=document.getElementById('pp').value;return v==='0'?99999:parseInt(v)}
async function load(){
  document.getElementById('lb').className='load on';
  const{data,error}=await db.from('leads').select('*').order('created_at',{ascending:false});
  document.getElementById('lb').className='load dn';
  setTimeout(()=>document.getElementById('lb').className='load',400);
  if(error){toast('Failed to load','er');console.error(error);return}
  all=data||[];filt();
}
// Category detection from company field
function getCat(c){
  if(!c)return'other';
  var lc=c.toLowerCase();
  if(lc.includes('coffee')||lc.includes('cafe')||lc.includes('roaster')||lc.includes('tea'))return'coffee';
  if(lc.includes('hotel')||lc.includes('resort')||lc.includes('inn')||lc.includes('lodge')||lc.includes('suites')||lc.includes('b&b')||lc.includes('bed &'))return'hotel';
  if(lc.includes('grocer')||lc.includes('market')||lc.includes('deli')||lc.includes('provisions')||lc.includes('fruits'))return'grocery';
  return'other';
}
// Colorado cities for in-state detection
var coCities=['denver','boulder','colorado springs','fort collins','pueblo','aspen','vail','telluride','breckenridge','steamboat','durango','estes park','glenwood','crested butte','golden','longmont','loveland','arvada','lakewood','aurora','littleton','englewood','broomfield','thornton','westminster','granby','frisco','dillon','silverthorne','rino','lohi','lodo','capitol hill','cherry creek','highlands','wheat ridge','parker','castle rock','monument','manitou','salida','buena vista','leadville','winter park','keystone','beaver creek','snowmass','carbondale','basalt','dolores','ouray','pagosa','montrose','grand junction','delta','gunnison','alamosa','trinidad','walsenburg','sterling','greeley','windsor','firestone','frederick','erie','lafayette','louisville','superior','nederland','lyons','niwot','evergreen','conifer','bailey','fairplay','south park','idaho springs','georgetown','central city','black hawk','jefferson county','rico','cortez','farmington','silverton','ridgway','norwood','naturita','hotchkiss','paonia','silt','rifle','new castle','eagle','avon','minturn','copper','monarch','woodland park','divide','cripple creek','victor','florence','canon city','penrose','westcliffe','silver cliff','la veta','san luis','blanca','fort garland','del norte','south fork','creede','lake city','cimarron'];
function isColorado(c){
  if(!c)return true;
  var lc=c.toLowerCase();
  if(lc.includes('colorado')||lc.includes(' co'))return true;
  for(var i=0;i<coCities.length;i++){if(lc.includes(coCities[i]))return true}
  return false;
}
function filt(){
  var q=document.getElementById('q').value.toLowerCase().trim();
  var catF=document.getElementById('catFil').value;
  var locF=document.getElementById('locFil').value;
  fil=all.filter(function(l){
    if(seg!=='all'&&l.status!==seg)return false;
    if(catF!=='all'&&getCat(l.company)!==catF)return false;
    if(locF==='in'&&!isColorado(l.company))return false;
    if(locF==='out'&&isColorado(l.company))return false;
    if(q&&!(l.name.toLowerCase().includes(q)||(l.company||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q)||(l.phone||'').includes(q)||l.status.toLowerCase().includes(q)))return false;
    return true;
  });
  fil.sort(function(a,b){var va=(a[sc]||'').toLowerCase(),vb=(b[sc]||'').toLowerCase();return va<vb?(sa?-1:1):va>vb?(sa?1:-1):0});
  cp=1;render();
}
function srt(c){if(sc===c)sa=!sa;else{sc=c;sa=true}filt()}
function selSeg(s){seg=s;filt()}
function render(){
  const cC=all.filter(l=>l.status==='Converted').length,cH=all.filter(l=>l.status==='Hot Lead').length,cS=all.filter(l=>l.status==='Scouting').length;
  document.getElementById('tabs').innerHTML=
    '<div class="seg-tab '+(seg==='all'?'active':'')+'" onclick="selSeg(\'all\')">All <span class="ct">'+all.length+'</span></div>'+
    '<div class="seg-tab '+(seg==='Converted'?'active':'')+'" onclick="selSeg(\'Converted\')">Converted <span class="ct">'+cC+'</span></div>'+
    '<div class="seg-tab '+(seg==='Hot Lead'?'active':'')+'" onclick="selSeg(\'Hot Lead\')">Hot Leads <span class="ct">'+cH+'</span></div>'+
    '<div class="seg-tab '+(seg==='Scouting'?'active':'')+'" onclick="selSeg(\'Scouting\')">Scouting <span class="ct">'+cS+'</span></div>';
  document.getElementById('st').innerHTML=
    '<div class="stat tt '+(seg==='all'?'sel':'')+'" onclick="selSeg(\'all\')"><div class="lb">Total</div><div class="vl">'+all.length+'</div></div>'+
    '<div class="stat cv '+(seg==='Converted'?'sel':'')+'" onclick="selSeg(\'Converted\')"><div class="lb">Converted</div><div class="vl">'+cC+'</div></div>'+
    '<div class="stat ht '+(seg==='Hot Lead'?'sel':'')+'" onclick="selSeg(\'Hot Lead\')"><div class="lb">Hot Leads</div><div class="vl">'+cH+'</div></div>'+
    '<div class="stat sc '+(seg==='Scouting'?'sel':'')+'" onclick="selSeg(\'Scouting\')"><div class="lb">Scouting</div><div class="vl">'+cS+'</div></div>';
  const p=pp(),start=(cp-1)*p,page=fil.slice(start,start+p);
  const tb=document.getElementById('tb');
  if(!page.length){tb.innerHTML='<tr><td colspan="6"><div class="empty">No leads found. Click + Add Lead to get started.</div></td></tr>';document.getElementById('pg').innerHTML='';return}
  tb.innerHTML=page.map(l=>'<tr><td><strong>'+esc(l.name)+'</strong></td><td>'+esc(l.company)+'</td><td>'+esc(l.email)+'</td><td>'+esc(l.phone)+'</td><td><span class="badge '+(l.status==='Converted'?'b-cv':l.status==='Hot Lead'?'b-ht':'b-sc')+'">'+esc(l.status)+'</span></td><td class="acts"><button class="btn btn-p btn-sm" onclick="edit('+l.id+')">Edit</button><button class="btn btn-d btn-sm" onclick="del('+l.id+')">Delete</button></td></tr>').join('');
  const s=(cp-1)*p+1,e=Math.min(cp*p,fil.length);
  document.getElementById('pg').innerHTML=fil.length?'<span class="pi">Showing '+s+'-'+e+' of '+fil.length+'</span>':'';
}
function openModal(l){
  document.getElementById('eid').value=l?l.id:'';
  document.getElementById('fn').value=l?l.name:'';
  document.getElementById('fc').value=l?l.company||'':'';
  document.getElementById('fe').value=l?l.email||'':'';
  document.getElementById('fp').value=l?l.phone||'':'';
  document.getElementById('fs').value=l?l.status:'Scouting';
  document.getElementById('mt').textContent=l?'Edit Lead':'Add New Lead';
  document.getElementById('mo').classList.add('active');
  setTimeout(function(){document.getElementById('fn').focus()},100);
}
function closeModal(){document.getElementById('mo').classList.remove('active')}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
async function save(){
  var n=document.getElementById('fn').value.trim();
  if(!n){alert('Name is required.');return}
  var btn=document.getElementById('sb');btn.disabled=true;btn.textContent='Saving...';
  var d={name:n,company:document.getElementById('fc').value.trim(),email:document.getElementById('fe').value.trim(),phone:document.getElementById('fp').value.trim(),status:document.getElementById('fs').value};
  var id=document.getElementById('eid').value;
  if(id){var r=await db.from('leads').update(d).eq('id',Number(id));if(r.error)toast('Error: '+r.error.message,'er');else toast('Lead updated','ok')}
  else{var r=await db.from('leads').insert([d]);if(r.error)toast('Error: '+r.error.message,'er');else toast('Lead added','ok')}
  btn.textContent='Save Lead';btn.disabled=false;closeModal();load();
}
function edit(id){var l=all.find(function(x){return x.id===id});if(l)openModal(l)}
async function del(id){if(!confirm('Delete this lead?'))return;var r=await db.from('leads').delete().eq('id',id);if(r.error)toast('Error','er');else{toast('Deleted','ok');load()}}
function csv(){
  var h='Name,Company,Email,Phone,Status';
  var r=fil.map(function(l){return[l.name,l.company,l.email,l.phone,l.status].map(function(v){return'"'+(v||'').replace(/"/g,'""')+'"'}).join(',')});
  var b=new Blob([h+'\n'+r.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='leads_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function toast(m,t){var e=document.getElementById('tt');e.textContent=m;e.className='toast '+t+' show';setTimeout(function(){e.className='toast'},2500)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
db.channel('leads-live').on('postgres_changes',{event:'*',schema:'public',table:'leads'},function(){load()}).subscribe();

// Auto-sync: check if SEED_DATA has contacts not yet in the database
async function autoSync(){
  if(typeof SEED_DATA==='undefined'||!SEED_DATA.length)return;
  var{data:existing}=await db.from('leads').select('name,company');
  if(!existing)existing=[];
  var existingKeys=new Set(existing.map(function(l){return(l.name||'')+'|'+(l.company||'')}));
  var missing=SEED_DATA.filter(function(l){return!existingKeys.has((l.name||'')+'|'+(l.company||''))});
  if(missing.length>0){
    // Insert in batches of 50
    for(var i=0;i<missing.length;i+=50){
      var batch=missing.slice(i,i+50);
      await db.from('leads').insert(batch);
    }
    toast(missing.length+' new contacts synced','ok');
    load();
  }
}

load();
autoSync();
</script>
</body>
</html>
